<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" />
  <style>
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .torrent-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .search-result-overview {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body class="antialiased">
  <div class="wrapper">

    <!-- ── Navbar ──────────────────────────────────────────────────────── -->
    <header class="navbar navbar-expand-md d-print-none">
      <div class="container-xl">
        <a href="/" class="navbar-brand">
          <span class="navbar-brand-text fw-bold">Homelab Dashboard</span>
        </a>
      </div>
    </header>

    <!-- ── Page ───────────────────────────────────────────────────────── -->
    <div class="page-wrapper">
      <div class="page-body">
        <div class="container-xl">
          <div class="row g-3">

            <!-- ── System ─────────────────────────────────────────────── -->
            <div class="col-12 col-md-6">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">System</h3>
                </div>
                <div class="card-body">

                  <!-- Health -->
                  <div class="mb-3">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                      <span class="text-secondary small text-uppercase fw-bold">Services</span>
                      <button class="btn btn-sm btn-primary" onclick="loadHealth(this)">
                        Check Health
                      </button>
                    </div>
                    <div id="health-grid" class="row g-2"></div>
                  </div>

                  <hr class="my-3" />

                  <!-- VPN -->
                  <div class="mb-3">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                      <span class="text-secondary small text-uppercase fw-bold">VPN</span>
                      <button class="btn btn-sm btn-primary" onclick="loadVPN(this)">
                        Check VPN
                      </button>
                    </div>
                    <div id="vpn-result"></div>
                  </div>

                  <hr class="my-3" />

                  <!-- Storage -->
                  <div>
                    <div class="d-flex align-items-center justify-content-between mb-2">
                      <span class="text-secondary small text-uppercase fw-bold">Storage</span>
                      <button class="btn btn-sm btn-primary" onclick="loadStorage(this)">
                        Refresh
                      </button>
                    </div>
                    <div id="storage-result"></div>
                  </div>

                </div>
              </div>
            </div>

            <!-- ── Media ──────────────────────────────────────────────── -->
            <div class="col-12 col-md-6">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Media</h3>
                </div>
                <div class="card-body">

                  <div class="d-flex gap-2 mb-3">
                    <button class="btn btn-primary" onclick="scanLibraries(this)">
                      Scan Libraries
                    </button>
                    <button class="btn btn-secondary" onclick="loadRecent(this)">
                      Recent Additions
                    </button>
                  </div>

                  <div id="scan-result" class="mb-2"></div>

                  <div id="recent-list"></div>

                </div>
              </div>
            </div>

            <!-- ── Downloads ──────────────────────────────────────────── -->
            <div class="col-12">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Downloads</h3>
                </div>
                <div class="card-body">

                  <div class="d-flex flex-wrap gap-2 mb-3">
                    <button class="btn btn-primary" onclick="loadDownloads(this)">
                      Active Torrents
                    </button>
                    <button class="btn btn-secondary" onclick="loadSpeed(this)">
                      Speed
                    </button>
                    <button class="btn btn-danger" onclick="cleanupDownloads(this)">
                      Remove Completed
                    </button>
                  </div>

                  <div id="speed-display" class="mb-3"></div>
                  <div id="cleanup-result" class="mb-2"></div>
                  <div id="torrent-list"></div>

                </div>
              </div>
            </div>

            <!-- ── Search ─────────────────────────────────────────────── -->
            <div class="col-12">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Search</h3>
                </div>
                <div class="card-body">

                  <div class="d-flex gap-3 mb-3">
                    <label class="form-check">
                      <input class="form-check-input" type="radio" name="search-type" value="movies" checked />
                      <span class="form-check-label">Movies</span>
                    </label>
                    <label class="form-check">
                      <input class="form-check-input" type="radio" name="search-type" value="shows" />
                      <span class="form-check-label">TV Shows</span>
                    </label>
                  </div>

                  <div class="input-group mb-3">
                    <input type="text" id="search-input" class="form-control"
                           placeholder="Search for a title…"
                           onkeydown="if(event.key==='Enter') doSearch()" />
                    <button class="btn btn-primary" onclick="doSearch()">Search</button>
                  </div>

                  <div id="search-result" class="mb-2"></div>
                  <div id="search-results"></div>

                </div>
              </div>
            </div>

          </div><!-- /.row -->
        </div><!-- /.container-xl -->
      </div><!-- /.page-body -->

      <footer class="footer footer-transparent d-print-none">
        <div class="container-xl">
          <div class="row text-center">
            <div class="col-12 col-lg-auto mt-3 mt-lg-0">
              <small class="text-secondary">homelab-api</small>
            </div>
          </div>
        </div>
      </footer>
    </div><!-- /.page-wrapper -->
  </div><!-- /.wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
  <script>
    // ── Helpers ────────────────────────────────────────────────────────────

    function busy(btn) {
      btn.disabled = true;
      btn._label = btn.innerHTML;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${btn._label}`;
    }

    function done(btn) {
      btn.disabled = false;
      btn.innerHTML = btn._label;
    }

    async function api(path, method = "GET") {
      const resp = await fetch(path, { method });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    function alert(id, msg, type = "secondary") {
      document.getElementById(id).innerHTML = msg
        ? `<div class="alert alert-${type} py-2 mb-0">${msg}</div>`
        : "";
    }

    // ── Health ─────────────────────────────────────────────────────────────

    async function loadHealth(btn) {
      busy(btn);
      const grid = document.getElementById("health-grid");
      grid.innerHTML = "";
      try {
        const data = await api("/api/health");
        Object.entries(data).forEach(([name, status]) => {
          const col = document.createElement("div");
          col.className = "col-6 col-sm-4 col-md-6 col-lg-3";
          const color = status === "up" ? "success" : "danger";
          col.innerHTML = `
            <div class="d-flex align-items-center">
              <span class="status-dot bg-${color}"></span>
              <span class="text-capitalize">${name}</span>
              <span class="badge bg-${color}-lt ms-auto">${status}</span>
            </div>`;
          grid.appendChild(col);
        });
      } catch (e) {
        grid.innerHTML = `<div class="col-12"><span class="text-danger">Failed: ${e.message}</span></div>`;
      }
      done(btn);
    }

    // ── VPN ────────────────────────────────────────────────────────────────

    async function loadVPN(btn) {
      busy(btn);
      const el = document.getElementById("vpn-result");
      el.innerHTML = "";
      try {
        const data = await api("/api/vpn");
        const color = data.connected ? "success" : "danger";
        const label = data.connected ? "Connected" : "Disconnected";
        el.innerHTML = `
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-${color}">${label}</span>
            <span class="text-secondary small">${data.message}</span>
          </div>`;
      } catch (e) {
        el.innerHTML = `<span class="text-danger">Failed: ${e.message}</span>`;
      }
      done(btn);
    }

    // ── Storage ────────────────────────────────────────────────────────────

    async function loadStorage(btn) {
      busy(btn);
      const el = document.getElementById("storage-result");
      el.innerHTML = "";
      try {
        const d = await api("/api/storage");
        if (d.error) {
          el.innerHTML = `<span class="text-danger">${d.error}</span>`;
        } else {
          el.innerHTML = `
            <div class="d-flex justify-content-between mb-1 small">
              <span>${d.used} used</span>
              <span class="text-secondary">${d.free} free of ${d.total}</span>
            </div>
            <div class="progress mb-1" style="height:6px">
              <div class="progress-bar" style="width:${d.percent_used}%"></div>
            </div>
            <div class="text-secondary small">${d.percent_used}% used</div>`;
        }
      } catch (e) {
        el.innerHTML = `<span class="text-danger">Failed: ${e.message}</span>`;
      }
      done(btn);
    }

    // ── Jellyfin ───────────────────────────────────────────────────────────

    async function scanLibraries(btn) {
      busy(btn);
      alert("scan-result", "");
      try {
        const data = await api("/api/jellyfin/scan", "POST");
        alert("scan-result", data.status || data.error, data.error ? "danger" : "success");
      } catch (e) {
        alert("scan-result", "Scan failed: " + e.message, "danger");
      }
      done(btn);
    }

    async function loadRecent(btn) {
      busy(btn);
      const el = document.getElementById("recent-list");
      el.innerHTML = "";
      try {
        const data = await api("/api/jellyfin/recent");
        if (data.error) {
          el.innerHTML = `<span class="text-danger">${data.error}</span>`;
        } else if (!data.length) {
          el.innerHTML = `<span class="text-secondary">No recent items</span>`;
        } else {
          const rows = data.map(item => `
            <tr>
              <td>${item.Name || "Unknown"}</td>
              <td class="text-secondary">${item.ProductionYear || "—"}</td>
              <td><span class="badge bg-secondary-lt">${item.Type || "—"}</span></td>
            </tr>`).join("");
          el.innerHTML = `
            <div class="table-responsive">
              <table class="table table-vcenter table-sm">
                <thead><tr><th>Title</th><th>Year</th><th>Type</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        }
      } catch (e) {
        el.innerHTML = `<span class="text-danger">Failed: ${e.message}</span>`;
      }
      done(btn);
    }

    // ── Downloads ──────────────────────────────────────────────────────────

    async function loadSpeed(btn) {
      busy(btn);
      const el = document.getElementById("speed-display");
      el.innerHTML = "";
      try {
        const d = await api("/api/downloads/speed");
        if (d.error) {
          el.innerHTML = `<span class="text-danger">${d.error}</span>`;
        } else {
          el.innerHTML = `
            <div class="row g-3">
              <div class="col-auto">
                <div class="subheader">↓ Download</div>
                <div class="h3 mb-0">${d.dl_speed_human}</div>
              </div>
              <div class="col-auto">
                <div class="subheader">↑ Upload</div>
                <div class="h3 mb-0">${d.up_speed_human}</div>
              </div>
            </div>`;
        }
      } catch (e) {
        el.innerHTML = `<span class="text-danger">Failed: ${e.message}</span>`;
      }
      done(btn);
    }

    async function loadDownloads(btn) {
      busy(btn);
      const el = document.getElementById("torrent-list");
      el.innerHTML = "";
      try {
        const data = await api("/api/downloads");
        if (data.error) {
          el.innerHTML = `<span class="text-danger">${data.error}</span>`;
        } else if (!data.length) {
          el.innerHTML = `<span class="text-secondary">No active torrents</span>`;
        } else {
          const rows = data.map(t => {
            const pct = Math.round((t.progress || 0) * 100);
            const dl = _humanSpeed(t.dlspeed || 0);
            const stateColor = t.progress === 1 ? "success" : "primary";
            return `
              <tr>
                <td style="max-width:300px">
                  <div class="torrent-name">${t.name || "Unknown"}</div>
                  <div class="progress mt-1" style="height:4px">
                    <div class="progress-bar bg-${stateColor}" style="width:${pct}%"></div>
                  </div>
                </td>
                <td class="text-secondary">${pct}%</td>
                <td>↓ ${dl}</td>
                <td><span class="badge bg-secondary-lt">${t.state || "—"}</span></td>
              </tr>`;
          }).join("");
          el.innerHTML = `
            <div class="table-responsive">
              <table class="table table-vcenter table-sm">
                <thead><tr><th>Name</th><th>Progress</th><th>Speed</th><th>State</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        }
      } catch (e) {
        el.innerHTML = `<span class="text-danger">Failed: ${e.message}</span>`;
      }
      done(btn);
    }

    async function cleanupDownloads(btn) {
      busy(btn);
      alert("cleanup-result", "");
      try {
        const data = await api("/api/downloads/cleanup", "POST");
        if (data.error) alert("cleanup-result", data.error, "danger");
        else alert("cleanup-result", `Removed ${data.removed} completed torrent(s)`, "success");
      } catch (e) {
        alert("cleanup-result", "Cleanup failed: " + e.message, "danger");
      }
      done(btn);
    }

    // ── Search ─────────────────────────────────────────────────────────────

    async function doSearch() {
      const term = document.getElementById("search-input").value.trim();
      if (!term) return;
      const type = document.querySelector('input[name="search-type"]:checked').value;
      const endpoint = type === "movies"
        ? `/api/radarr/search?q=${encodeURIComponent(term)}`
        : `/api/sonarr/search?q=${encodeURIComponent(term)}`;

      const el = document.getElementById("search-results");
      el.innerHTML = "";
      alert("search-result", "Searching…");

      try {
        const data = await api(endpoint);
        alert("search-result", "");
        if (data.error) { alert("search-result", data.error, "danger"); return; }
        if (!data.length) { alert("search-result", "No results found", "secondary"); return; }

        const rows = data.slice(0, 15).map(item => {
          const year = item.year ? ` <span class="text-secondary">(${item.year})</span>` : "";
          const overview = item.overview
            ? `<div class="search-result-overview mt-1">${item.overview}</div>` : "";
          return `
            <tr>
              <td>
                <div>${item.title || item.name || "Unknown"}${year}</div>
                ${overview}
              </td>
            </tr>`;
        }).join("");

        el.innerHTML = `
          <div class="table-responsive">
            <table class="table table-vcenter table-sm">
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (e) {
        alert("search-result", "Search failed: " + e.message, "danger");
      }
    }

    // ── Utils ──────────────────────────────────────────────────────────────

    function _humanSpeed(bps) {
      const units = ["B/s", "KB/s", "MB/s", "GB/s"];
      let i = 0;
      while (bps >= 1024 && i < units.length - 1) { bps /= 1024; i++; }
      return `${bps.toFixed(1)} ${units[i]}`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --accent:  #6c8ef7;
      --green:   #4caf82;
      --red:     #e05c5c;
      --text:    #d0d4e8;
      --muted:   #6b7094;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
         letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover  { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.danger { background: var(--red); }

    .result {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 18px;
    }

    /* Health grid */
    .health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .health-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
    }
    .dot.up   { background: var(--green); }
    .dot.down { background: var(--red); }

    /* VPN badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge.connected    { background: #1a3a2a; color: var(--green); }
    .badge.disconnected { background: #3a1a1a; color: var(--red); }

    /* Storage bar */
    .bar-track {
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      margin: 8px 0 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-label { font-size: 0.78rem; color: var(--muted); }

    /* Recent items */
    .media-list { list-style: none; margin-top: 8px; }
    .media-list li {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .media-list li:last-child { border-bottom: none; }
    .media-list .year { color: var(--muted); margin-left: 6px; }

    /* Torrent list */
    .torrent-list { list-style: none; margin-top: 8px; }
    .torrent-list li {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .torrent-list li:last-child { border-bottom: none; }
    .torrent-progress {
      background: var(--border);
      border-radius: 3px;
      height: 4px;
      margin-top: 4px;
    }
    .torrent-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
    }
    .torrent-meta { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

    /* Search */
    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-row input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.85rem;
      outline: none;
    }
    .search-row input[type="text"]:focus { border-color: var(--accent); }

    .radio-group { display: flex; gap: 16px; margin-bottom: 10px; font-size: 0.85rem; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    .search-results { list-style: none; margin-top: 10px; }
    .search-results li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .search-results li:last-child { border-bottom: none; }
    .search-results .overview {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Speed display */
    .speed-display {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }
    .speed-item { font-size: 0.82rem; }
    .speed-item .label { color: var(--muted); font-size: 0.75rem; }
    .speed-item .value { font-size: 1.1rem; font-weight: 600; color: #fff; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Homelab Dashboard</h1>

<!-- ── System ──────────────────────────────────────────────────────────── -->
<div class="card">
  <h2>System</h2>

  <div class="row">
    <button onclick="loadHealth(this)">Check Health</button>
    <button onclick="loadVPN(this)">Check VPN</button>
    <button onclick="loadStorage(this)">Storage</button>
  </div>

  <div id="health-grid" class="health-grid"></div>

  <div id="vpn-result" class="result"></div>

  <div id="storage-result"></div>
</div>

<!-- ── Media ───────────────────────────────────────────────────────────── -->
<div class="card">
  <h2>Media</h2>

  <div class="row">
    <button onclick="scanLibraries(this)">Scan Libraries</button>
    <button onclick="loadRecent(this)">Recent Additions</button>
  </div>

  <div id="scan-result" class="result"></div>
  <ul id="recent-list" class="media-list"></ul>
</div>

<!-- ── Downloads ───────────────────────────────────────────────────────── -->
<div class="card">
  <h2>Downloads</h2>

  <div class="row">
    <button onclick="loadDownloads(this)">Active Torrents</button>
    <button onclick="loadSpeed(this)">Speed</button>
    <button class="danger" onclick="cleanupDownloads(this)">Remove Completed</button>
  </div>

  <div id="speed-display" class="speed-display"></div>
  <div id="cleanup-result" class="result"></div>
  <ul id="torrent-list" class="torrent-list"></ul>
</div>

<!-- ── Search ──────────────────────────────────────────────────────────── -->
<div class="card">
  <h2>Search</h2>

  <div class="radio-group">
    <label><input type="radio" name="search-type" value="movies" checked /> Movies</label>
    <label><input type="radio" name="search-type" value="shows" /> TV Shows</label>
  </div>

  <div class="search-row">
    <input type="text" id="search-input" placeholder="Title…" onkeydown="if(event.key==='Enter') doSearch()" />
    <button onclick="doSearch()">Search</button>
  </div>

  <div id="search-result" class="result"></div>
  <ul id="search-results" class="search-results"></ul>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────

  function busy(btn) {
    btn.disabled = true;
    btn._label = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>' + btn._label;
  }

  function done(btn) {
    btn.disabled = false;
    btn.textContent = btn._label;
  }

  async function api(path, method = "GET") {
    const resp = await fetch(path, { method });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  function setResult(id, msg, isError = false) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.color = isError ? "var(--red)" : "var(--muted)";
    el.textContent = msg;
  }

  // ── Health ───────────────────────────────────────────────────────────────

  async function loadHealth(btn) {
    busy(btn);
    const grid = document.getElementById("health-grid");
    grid.innerHTML = "";
    try {
      const data = await api("/api/health");
      Object.entries(data).forEach(([name, status]) => {
        const item = document.createElement("div");
        item.className = "health-item";
        item.innerHTML = `<span class="dot ${status}"></span><span>${name}</span>`;
        grid.appendChild(item);
      });
    } catch (e) {
      grid.textContent = "Failed to load health";
    }
    done(btn);
  }

  // ── VPN ──────────────────────────────────────────────────────────────────

  async function loadVPN(btn) {
    busy(btn);
    setResult("vpn-result", "");
    try {
      const data = await api("/api/vpn");
      const cls = data.connected ? "connected" : "disconnected";
      const label = data.connected ? "VPN Connected" : "VPN Disconnected";
      document.getElementById("vpn-result").innerHTML =
        `<span class="badge ${cls}">${label}</span>
         <span style="margin-left:8px;font-size:.8rem;color:var(--muted)">${data.message}</span>`;
    } catch (e) {
      setResult("vpn-result", "VPN check failed", true);
    }
    done(btn);
  }

  // ── Storage ──────────────────────────────────────────────────────────────

  async function loadStorage(btn) {
    busy(btn);
    const el = document.getElementById("storage-result");
    el.innerHTML = "";
    try {
      const d = await api("/api/storage");
      if (d.error) { el.innerHTML = `<div class="result" style="color:var(--red)">${d.error}</div>`; }
      else {
        el.innerHTML = `
          <div class="bar-track"><div class="bar-fill" style="width:${d.percent_used}%"></div></div>
          <div class="bar-label">${d.used} used of ${d.total} &nbsp;·&nbsp; ${d.free} free &nbsp;·&nbsp; ${d.percent_used}%</div>`;
      }
    } catch (e) {
      el.innerHTML = '<div class="result" style="color:var(--red)">Failed to load storage</div>';
    }
    done(btn);
  }

  // ── Jellyfin ─────────────────────────────────────────────────────────────

  async function scanLibraries(btn) {
    busy(btn);
    setResult("scan-result", "");
    try {
      const data = await api("/api/jellyfin/scan", "POST");
      setResult("scan-result", data.status || data.error || JSON.stringify(data), !!data.error);
    } catch (e) {
      setResult("scan-result", "Scan failed: " + e.message, true);
    }
    done(btn);
  }

  async function loadRecent(btn) {
    busy(btn);
    const list = document.getElementById("recent-list");
    list.innerHTML = "";
    try {
      const data = await api("/api/jellyfin/recent");
      if (data.error) { list.innerHTML = `<li style="color:var(--red)">${data.error}</li>`; }
      else if (!data.length) { list.innerHTML = '<li>No recent items</li>'; }
      else {
        data.forEach(item => {
          const li = document.createElement("li");
          const year = item.ProductionYear ? `<span class="year">${item.ProductionYear}</span>` : "";
          li.innerHTML = `${item.Name || "Unknown"}${year}`;
          list.appendChild(li);
        });
      }
    } catch (e) {
      list.innerHTML = `<li style="color:var(--red)">Failed: ${e.message}</li>`;
    }
    done(btn);
  }

  // ── Downloads ────────────────────────────────────────────────────────────

  async function loadSpeed(btn) {
    busy(btn);
    const el = document.getElementById("speed-display");
    el.innerHTML = "";
    try {
      const d = await api("/api/downloads/speed");
      if (d.error) { el.innerHTML = `<span style="color:var(--red)">${d.error}</span>`; }
      else {
        el.innerHTML = `
          <div class="speed-item">
            <div class="label">↓ Download</div>
            <div class="value">${d.dl_speed_human}</div>
          </div>
          <div class="speed-item">
            <div class="label">↑ Upload</div>
            <div class="value">${d.up_speed_human}</div>
          </div>`;
      }
    } catch (e) {
      el.innerHTML = `<span style="color:var(--red)">Failed: ${e.message}</span>`;
    }
    done(btn);
  }

  async function loadDownloads(btn) {
    busy(btn);
    const list = document.getElementById("torrent-list");
    list.innerHTML = "";
    try {
      const data = await api("/api/downloads");
      if (data.error) { list.innerHTML = `<li style="color:var(--red)">${data.error}</li>`; }
      else if (!data.length) { list.innerHTML = '<li>No active torrents</li>'; }
      else {
        data.forEach(t => {
          const pct = Math.round((t.progress || 0) * 100);
          const dl = _humanSpeed(t.dlspeed || 0);
          const li = document.createElement("li");
          li.innerHTML = `
            <div>${t.name || "Unknown"}</div>
            <div class="torrent-progress">
              <div class="torrent-progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="torrent-meta">${pct}% &nbsp;·&nbsp; ↓ ${dl} &nbsp;·&nbsp; ${t.state || ""}</div>`;
          list.appendChild(li);
        });
      }
    } catch (e) {
      list.innerHTML = `<li style="color:var(--red)">Failed: ${e.message}</li>`;
    }
    done(btn);
  }

  async function cleanupDownloads(btn) {
    busy(btn);
    setResult("cleanup-result", "");
    try {
      const data = await api("/api/downloads/cleanup", "POST");
      if (data.error) setResult("cleanup-result", data.error, true);
      else setResult("cleanup-result", `Removed ${data.removed} completed torrent(s)`);
    } catch (e) {
      setResult("cleanup-result", "Cleanup failed: " + e.message, true);
    }
    done(btn);
  }

  // ── Search ───────────────────────────────────────────────────────────────

  async function doSearch() {
    const term = document.getElementById("search-input").value.trim();
    if (!term) return;
    const type = document.querySelector('input[name="search-type"]:checked').value;
    const endpoint = type === "movies"
      ? `/api/radarr/search?q=${encodeURIComponent(term)}`
      : `/api/sonarr/search?q=${encodeURIComponent(term)}`;

    const list = document.getElementById("search-results");
    list.innerHTML = "";
    setResult("search-result", "Searching…");

    try {
      const data = await api(endpoint);
      setResult("search-result", "");
      if (data.error) { setResult("search-result", data.error, true); return; }
      if (!data.length) { setResult("search-result", "No results"); return; }
      data.slice(0, 15).forEach(item => {
        const li = document.createElement("li");
        const year = item.year ? ` (${item.year})` : "";
        const overview = item.overview
          ? `<div class="overview">${item.overview}</div>` : "";
        li.innerHTML = `<strong>${item.title || item.name || "Unknown"}${year}</strong>${overview}`;
        list.appendChild(li);
      });
    } catch (e) {
      setResult("search-result", "Search failed: " + e.message, true);
    }
  }

  // ── Utils ────────────────────────────────────────────────────────────────

  function _humanSpeed(bps) {
    const units = ["B/s", "KB/s", "MB/s", "GB/s"];
    let i = 0;
    while (bps >= 1024 && i < units.length - 1) { bps /= 1024; i++; }
    return `${bps.toFixed(1)} ${units[i]}`;
  }
</script>
</body>
</html>

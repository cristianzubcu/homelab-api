name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flake8 pytest requests flask

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --exclude=.venv,venv

      - name: Run tests
        run: pytest tests/ -v
